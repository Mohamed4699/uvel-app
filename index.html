<!DOCTYPE html>
<html>
<head>
<title>UVEL Platform</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1c2c;
  color: white;
}

/* HEADER */
.header {
  text-align: center;
  padding: 40px;
}

.header h1 {
  font-size: 32px;
}

.buttons {
  margin-top: 20px;
}

button {
  padding: 12px 20px;
  margin: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
}

.ride { background: #22c55e; color: white; }
.driver { background: #3b82f6; color: white; }
.admin { background: #f59e0b; color: white; }

/* SECTIONS */
.section {
  display: none;
  background: #132b45;
  margin: 30px auto;
  padding: 30px;
  border-radius: 15px;
  width: 300px;
  text-align: center;
  box-shadow: 0px 5px 20px rgba(0,0,0,0.3);
}

input {
  width: 90%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
}

/* ACTIVE */
.active {
  display: block;
}
</style>

<script>
function show(section) {
  document.getElementById("ride").classList.remove("active");
  document.getElementById("driver").classList.remove("active");
  document.getElementById("admin").classList.remove("active");

  document.getElementById(section).classList.add("active");
}
</script>

</head>

<body>

<div class="header">
  <h1>🚗 UVEL Platform</h1>
  <p>Reliable Community Transport</p>

  <div class="buttons">
    <button class="ride" onclick="show('ride')">Ride App</button>
    <button class="driver" onclick="show('driver')">Driver App</button>
    <button class="admin" onclick="show('admin')">Admin Panel</button>
  </div>
</div>

<!-- RIDE -->
<div id="ride" class="section active">
  <h2>Book a Ride</h2>
  <input placeholder="Pickup location">
  <input placeholder="Destination">
  <button class="ride">Request Ride</button>
</div>

<!-- DRIVER -->
<div id="driver" class="section">
  <h2>Driver Status</h2>
  <button class="driver">Go Online</button>
  <button>Go Offline</button>
</div>

<!-- ADMIN -->
<div id="admin" class="section">
  <h2>System Overview</h2>
  <p>Users: 120</p>
  <p>Drivers: 45</p>
  <p>Trips Today: 89</p>
</div>

</body>
</html>
