<!DOCTYPE html>
<html>
<head>
<title>UVEL Pro Version</title>
<meta charset="UTF-8">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<h2>UVEL Admin Panel</h2>

<button onclick="exportActiveBookingsCSV()">Export Active CSV</button>
<button onclick="exportCompletedTripsCSV()">Export Completed CSV</button>
<button onclick="exportAdminPDF()">Export Admin PDF</button>

<script>

let bookings = [
  {id:"1", passengerName:"Huda", pickup:"A", destination:"B", km:10, status:"Assigned", fareAUD:0},
  {id:"2", passengerName:"Ali", pickup:"C", destination:"D", km:15, status:"Completed", fareAUD:0}
];

function calculateFare(km){
  const base = 10;
  const perKm = 2.5;
  return (base + km * perKm).toFixed(2);
}

bookings.forEach(b => b.fareAUD = calculateFare(b.km));

function downloadCSV(filename, rows){
  let csv = rows.map(r => r.join(",")).join("\n");
  let blob = new Blob([csv], { type: "text/csv" });
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

function exportActiveBookingsCSV(){
  const active = bookings.filter(b => b.status !== "Completed");
  const rows = [
    ["ID","Passenger","Pickup","Destination","KM","Fare","Status"],
    ...active.map(b => [b.id,b.passengerName,b.pickup,b.destination,b.km,b.fareAUD,b.status])
  ];
  downloadCSV("active.csv", rows);
}

function exportCompletedTripsCSV(){
  const completed = bookings.filter(b => b.status === "Completed");
  const rows = [
    ["ID","Passenger","Pickup","Destination","KM","Fare","Status"],
    ...completed.map(b => [b.id,b.passengerName,b.pickup,b.destination,b.km,b.fareAUD,b.status])
  ];
  downloadCSV("completed.csv", rows);
}

function exportAdminPDF(){
  const { jsPDF } = window.jspdf;
  let doc = new jsPDF();

  doc.text("UVEL Admin Report", 10, 10);

  let y = 20;
  bookings.forEach(b=>{
    doc.text(`ID:${b.id} | ${b.passengerName} | $${b.fareAUD} | ${b.status}`, 10, y);
    y += 10;
  });

  doc.save("admin-report.pdf");
}

function generateNDISInvoice(b){
  const { jsPDF } = window.jspdf;
  let doc = new jsPDF();

  doc.text("NDIS INVOICE", 10, 10);
  doc.text("Provider: UVEL", 10, 20);
  doc.text("Participant: " + b.passengerName, 10, 30);

  doc.text("Service Table:", 10, 40);
  doc.text(`Transport Service | ${b.km} km | $${b.fareAUD}`, 10, 50);

  doc.text("TOTAL: $" + b.fareAUD, 10, 70);

  doc.save("ndis-invoice.pdf");
}

</script>

</body>
</html>
