<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UVEL Firebase Auth Test</title>
  <style>
    body{font-family:Arial,sans-serif;background:#061623;color:#eef7ff;margin:0;padding:24px}
    .wrap{max-width:860px;margin:0 auto}
    .card{background:#0a2337;border:1px solid rgba(105,182,218,.22);border-radius:18px;padding:20px;margin-bottom:18px}
    input,select,button{width:100%;padding:14px;border-radius:12px;border:1px solid rgba(105,182,218,.22);background:#071827;color:#eef7ff;margin-top:8px;box-sizing:border-box}
    button{background:#49c4d5;color:#082030;font-weight:700;cursor:pointer}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    pre{white-space:pre-wrap;background:#071827;padding:14px;border-radius:12px;border:1px solid rgba(105,182,218,.22)}
    .ok{color:#87ebb0}.bad{color:#ff9f9f}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h2>UVEL Firebase Auth Test</h2>
      <p>This page is only for testing Firebase Authentication and Firestore user profile creation.</p>
      <p><strong>Use fresh emails first:</strong> admin4@uvel.com.au, driver4@uvel.com.au, passenger4@uvel.com.au</p>
    </div>

    <div class="row">
      <div class="card">
        <h3>Sign up</h3>
        <label>Name</label>
        <input id="suName" value="Moh" />
        <label>Email</label>
        <input id="suEmail" value="admin4@uvel.com.au" />
        <label>Password</label>
        <input id="suPass" value="12345678" />
        <label>Role</label>
        <select id="suRole">
          <option value="admin">admin</option>
          <option value="driver">driver</option>
          <option value="passenger">passenger</option>
        </select>
        <button id="signupBtn">Create account</button>
      </div>

      <div class="card">
        <h3>Sign in</h3>
        <label>Email</label>
        <input id="siEmail" value="admin4@uvel.com.au" />
        <label>Password</label>
        <input id="siPass" value="12345678" />
        <button id="signinBtn">Sign in</button>
        <button id="resetBtn" style="margin-top:10px;background:#0f3450;color:#eef7ff">Reset password</button>
      </div>
    </div>

    <div class="card">
      <h3>Status</h3>
      <pre id="out">Waiting...</pre>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA1vVdTnIew6pZQU3CrqGJkbhd9m79Md_Q",
      authDomain: "uvel-platform.firebaseapp.com",
      projectId: "uvel-platform",
      storageBucket: "uvel-platform.firebasestorage.app",
      messagingSenderId: "95958245890",
      appId: "1:95958245890:web:2afc9544e7ea16b395bd1b"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const out = document.getElementById("out");
    const log = (msg, ok=false) => {
      out.innerHTML = (ok ? "✅ " : "❌ ") + msg;
      out.className = ok ? "ok" : "bad";
      console.log(msg);
    };

    function explain(err){
      const c = err?.code || "";
      return `${c}\n${err?.message || ""}\n\nChecks:\n1. Authorized domains must include uvel-app.vercel.app\n2. Firestore users collection writable\n3. Fresh email if account already exists`;
    }

    document.getElementById("signupBtn").onclick = async () => {
      try{
        const name = document.getElementById("suName").value.trim();
        const email = document.getElementById("suEmail").value.trim();
        const pass = document.getElementById("suPass").value;
        const role = document.getElementById("suRole").value;
        const cred = await createUserWithEmailAndPassword(auth, email, pass);
        await setDoc(doc(db, "users", cred.user.uid), {
          name, email, role,
          activeLoad: 0,
          availability: role === "driver" ? "online" : null,
          vehicle: role === "driver" ? "Toyota HiAce" : null,
          createdAt: serverTimestamp()
        }, { merge: true });
        const snap = await getDoc(doc(db, "users", cred.user.uid));
        log(`Signup success\nuid: ${cred.user.uid}\nprofile exists: ${snap.exists()}\nemail: ${email}\nrole: ${role}`, true);
      }catch(err){
        log("Signup failed\n" + explain(err));
      }
    };

    document.getElementById("signinBtn").onclick = async () => {
      try{
        const email = document.getElementById("siEmail").value.trim();
        const pass = document.getElementById("siPass").value;
        const cred = await signInWithEmailAndPassword(auth, email, pass);
        const snap = await getDoc(doc(db, "users", cred.user.uid));
        log(`Signin success\nuid: ${cred.user.uid}\nprofile exists: ${snap.exists()}\nemail: ${email}\nprofile: ${JSON.stringify(snap.data() || {}, null, 2)}`, true);
      }catch(err){
        log("Signin failed\n" + explain(err));
      }
    };

    document.getElementById("resetBtn").onclick = async () => {
      try{
        const email = document.getElementById("siEmail").value.trim();
        await sendPasswordResetEmail(auth, email);
        log(`Password reset email sent to ${email}`, true);
      }catch(err){
        log("Reset failed\n" + explain(err));
      }
    };
  </script>
</body>
</html>
