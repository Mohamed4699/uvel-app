<!DOCTYPE html>
<html>
<head>
  <title>UVEL Platform</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1c2c;
      color: white;
    }

    .header {
      text-align: center;
      padding: 40px 20px 20px;
    }

    .header h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .header p {
      font-size: 18px;
      margin: 0;
    }

    .buttons {
      margin-top: 25px;
    }

    button {
      padding: 12px 20px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      font-size: 15px;
    }

    .ride { background: #22c55e; color: white; }
    .driver { background: #3b82f6; color: white; }
    .admin { background: #f59e0b; color: white; }

    .secondary-btn {
      background: #ffffff;
      color: #111827;
    }

    .delete-btn {
      background: #ef4444;
      color: white;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 14px;
      margin-top: 10px;
    }

    .complete-btn {
      background: #16a34a;
      color: white;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 14px;
      margin-top: 10px;
    }

    .section {
      display: none;
      background: #132b45;
      margin: 30px auto;
      padding: 30px;
      border-radius: 18px;
      width: 90%;
      max-width: 560px;
      text-align: center;
    }

    input, select {
      width: 90%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
    }

    .active { display: block; }

    .booking-card {
      background: #0f2236;
      border-radius: 12px;
      padding: 15px;
      margin-top: 15px;
      text-align: left;
    }

    .status {
      display: inline-block;
      margin-top: 8px;
      padding: 6px 10px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: bold;
    }

    .pending { background: #f59e0b; color: #111827; }
    .assigned { background: #3b82f6; color: white; }
    .completed { background: #16a34a; color: white; }

    .empty-text {
      color: #d1d5db;
      text-align: center;
    }
  </style>
</head>

<body>

<div class="header">
  <h1>🚗 UVEL Platform</h1>
  <p>Reliable Community Transport</p>

  <div class="buttons">
    <button class="ride" onclick="show('ride')">Ride App</button>
    <button class="driver" onclick="show('driver')">Driver App</button>
    <button class="admin" onclick="show('admin')">Admin Panel</button>
  </div>
</div>

<div id="ride" class="section active">
  <h2>Book a Ride</h2>
  <input id="pickup" placeholder="Pickup location">
  <input id="destination" placeholder="Destination">
  <button class="ride" onclick="requestRide()">Request Ride</button>
</div>

<div id="driver" class="section">
  <h2>Driver</h2>
  <div id="driverTrips"></div>
</div>

<div id="admin" class="section">
  <h2>Bookings</h2>
  <div id="bookingList"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  doc,
  updateDoc,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA1vVdTnIew6pZQU3CrqGJkbhd9m79Md_Q",
  authDomain: "uvel-platform.firebaseapp.com",
  projectId: "uvel-platform",
  storageBucket: "uvel-platform.firebasestorage.app",
  messagingSenderId: "95958245890",
  appId: "1:95958245890:web:2afc9544e7ea16b395bd1b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const drivers = ["Michael", "Olivia", "Daniel", "Nadia"];

window.show = function(section) {
  document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
  document.getElementById(section).classList.add("active");

  if (section === "admin") showBookings();
  if (section === "driver") showDriverTrips();
};

window.requestRide = async function() {
  const pickup = pickupInput.value.trim();
  const destination = destinationInput.value.trim();

  if (!pickup || !destination) return alert("Fill all fields");

  await addDoc(collection(db, "bookings"), {
    pickup,
    destination,
    status: "Pending",
    driver: "Unassigned"
  });

  pickupInput.value = "";
  destinationInput.value = "";

  alert("Ride Requested ✅");
  showBookings();
};

const pickupInput = document.getElementById("pickup");
const destinationInput = document.getElementById("destination");

function getStatusClass(status) {
  return status === "Assigned" ? "assigned" :
         status === "Completed" ? "completed" : "pending";
}

window.showBookings = async function() {
  const snapshot = await getDocs(collection(db, "bookings"));
  const list = document.getElementById("bookingList");

  if (snapshot.empty) {
    list.innerHTML = '<p class="empty-text">No bookings</p>';
    return;
  }

  let html = "";

  snapshot.forEach(docSnap => {
    const b = docSnap.data();
    const id = docSnap.id;

    html += `
      <div class="booking-card">
        <p><b>Pickup:</b> ${b.pickup}</p>
        <p><b>Destination:</b> ${b.destination}</p>
        <p><b>Driver:</b> ${b.driver}</p>
        <span class="status ${getStatusClass(b.status)}">${b.status}</span>

        ${b.status === "Pending" ? `
          <select onchange="assignDriver('${id}', this.value)">
            <option>Select driver</option>
            ${drivers.map(d => `<option>${d}</option>`).join("")}
          </select>` : ""}

        ${b.status === "Assigned" ? `
          <button class="complete-btn" onclick="completeTrip('${id}')">Complete</button>` : ""}

        <button class="delete-btn" onclick="deleteBooking('${id}')">Delete</button>
      </div>
    `;
  });

  list.innerHTML = html;
};

window.assignDriver = async function(id, driver) {
  if (!driver) return;
  await updateDoc(doc(db, "bookings", id), { driver, status: "Assigned" });
  showBookings();
  showDriverTrips();
};

window.completeTrip = async function(id) {
  await updateDoc(doc(db, "bookings", id), { status: "Completed" });
  showBookings();
};

window.deleteBooking = async function(id) {
  if (!confirm("Delete booking?")) return;
  await deleteDoc(doc(db, "bookings", id));
  showBookings();
};

window.showDriverTrips = async function() {
  const snapshot = await getDocs(collection(db, "bookings"));
  const list = document.getElementById("driverTrips");

  let html = "";
  snapshot.forEach(docSnap => {
    const b = docSnap.data();
    if (b.status === "Assigned") {
      html += `
        <div class="booking-card">
          <p>${b.pickup} → ${b.destination}</p>
          <p>Driver: ${b.driver}</p>
        </div>
      `;
    }
  });

  list.innerHTML = html || '<p class="empty-text">No trips</p>';
};

window.onload = () => showBookings();

</script>

</body>
</html>
