<!DOCTYPE html>
<html>
<head>
<title>UVEL Week 4 (Level 9 Demo Ready)</title>
<style>
body {font-family: Arial; margin:0; background:#f5f7fa;}
header {background:#0f172a; color:white; padding:15px;}
.container {padding:20px;}
.card {background:white; padding:15px; margin-bottom:15px; border-radius:10px;}
button {padding:10px 15px; border:none; border-radius:6px; cursor:pointer;}
.primary {background:#2FA4A9; color:white;}
.status {padding:4px 8px; border-radius:5px; font-size:12px;}
.pending {background:#facc15;}
.assigned {background:#60a5fa;}
.completed {background:#34d399;}
</style>
</head>

<body>

<header>
<h2>UVEL • Week 4 Demo</h2>
</header>

<div class="container">

<h3>Passenger - Book Ride</h3>
<div class="card">
<input placeholder="Pickup"><br><br>
<input placeholder="Destination"><br><br>
<input type="date"><br><br>
<button class="primary">Request Ride</button>
</div>

<h3>Admin - Dispatch</h3>
<div class="card">
<div class="status pending">Pending</div>
<p>Liverpool → Westmead</p>
<button class="primary">Assign Driver</button>
</div>

<div class="card">
<div class="status assigned">Assigned</div>
<p>Bankstown → City</p>
</div>

<div class="card">
<div class="status completed">Completed</div>
<p>Parramatta → Airport</p>
</div>

<h3>Driver - Active Trip</h3>
<div class="card">
<p>Pickup: Liverpool</p>
<p>Destination: Westmead</p>
<button class="primary">Start Trip</button>
</div>

</div>

</body>
</html>
