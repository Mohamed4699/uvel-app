<!DOCTYPE html>
<html>
<head>
<title>UVEL FULL FINAL v8</title>

<!-- Stripe -->
<script src="https://js.stripe.com/v3/"></script>

<!-- Charts -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<body>

<h2>UVEL Admin Dashboard</h2>

<div id="stats">
  <p>Total Revenue: <span id="rev">$0</span></p>
</div>

<canvas id="revenueChart"></canvas>

<script>
// MOCK DATA (replace with your Firebase data)
let allBookings = [
  {fare: 25, paymentStatus:"paid", tripDate:"2026-04-01"},
  {fare: 40, paymentStatus:"paid", tripDate:"2026-04-01"},
  {fare: 15, paymentStatus:"unpaid", tripDate:"2026-04-02"},
];

// ===== REVENUE CALC =====
function renderStats(){
  const paid = allBookings.filter(b=>b.paymentStatus==="paid");
  const total = paid.reduce((s,b)=>s+Number(b.fare||0),0);
  document.getElementById("rev").innerText = "$"+total;
}

// ===== CHART =====
function renderChart(){
  const paid = allBookings.filter(b=>b.paymentStatus==="paid");

  const daily = {};
  paid.forEach(b=>{
    daily[b.tripDate] = (daily[b.tripDate]||0)+Number(b.fare||0);
  });

  const labels = Object.keys(daily);
  const data = Object.values(daily);

  new Chart(document.getElementById("revenueChart"),{
    type:"line",
    data:{
      labels,
      datasets:[{
        label:"Revenue",
        data
      }]
    }
  });
}

// ===== INIT =====
renderStats();
renderChart();

</script>

</body>
</html>
