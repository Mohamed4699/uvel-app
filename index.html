<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UVEL Passenger Dashboard - Updated Full Version</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&display=swap" rel="stylesheet" />

  <style>

:root{
  --bg:#061623;--card:#0b2438;--card2:#0f2f49;--line:rgba(100,190,220,.23);--text:#f2f8ff;--muted:#9fbfd1;--brand:#49c4d5;--brand2:#2fa4a9;--ok:#56d58b;--warn:#f2c14e;--danger:#ff7777;--shadow:0 18px 45px rgba(0,0,0,.28);--radius:22px;
}
*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:'DM Sans',Inter,Segoe UI,Arial,sans-serif;color:var(--text);background:radial-gradient(circle at top left,rgba(73,196,213,.15),transparent 28%),radial-gradient(circle at bottom right,rgba(47,164,169,.13),transparent 24%),linear-gradient(180deg,#04101a,#061623)}
.page{max-width:1180px;margin:0 auto;padding:22px;display:grid;gap:18px}.top-bar{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:18px 20px;border:1px solid var(--line);background:rgba(8,28,44,.88);backdrop-filter:blur(12px);border-radius:var(--radius);box-shadow:var(--shadow);position:sticky;top:14px;z-index:10}.top-bar-left{display:flex;align-items:center;gap:14px}.avatar{width:48px;height:48px;border-radius:16px;background:linear-gradient(135deg,var(--brand),#8debf2);color:#05202d;font-weight:900;display:grid;place-items:center}.top-bar-title{font-size:21px;font-weight:900}.top-bar-sub,.section-sub{color:var(--muted);font-size:14px}.status-pill{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:999px;padding:10px 14px;color:var(--muted);background:rgba(255,255,255,.04);font-weight:700}.status-dot{width:10px;height:10px;border-radius:99px;background:var(--ok);box-shadow:0 0 0 6px rgba(86,213,139,.12)}
.card{border:1px solid var(--line);border-radius:var(--radius);background:linear-gradient(180deg,rgba(11,36,56,.96),rgba(7,25,39,.98));box-shadow:var(--shadow);padding:20px}.section-head{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;margin-bottom:18px}.section-title{margin:0 0 4px;font-size:22px;line-height:1.15}.booking-body{display:grid;gap:16px}.type-toggle{display:grid;grid-template-columns:1fr 1fr;gap:10px;background:#061826;border:1px solid var(--line);border-radius:18px;padding:8px}.type-btn,.tab,.btn,.reason-btn{border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--text);border-radius:14px;padding:12px 14px;font-weight:800;cursor:pointer;transition:.18s}.type-btn:hover,.tab:hover,.btn:hover,.reason-btn:hover{transform:translateY(-1px);background:rgba(255,255,255,.07)}.type-btn.active,.tab.active,.btn-primary{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#05202d;border-color:transparent}.btn-ghost{background:rgba(255,255,255,.035)}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.form-group.full,.form-group--full{grid-column:1/-1}.form-label{display:block;margin-bottom:7px;color:var(--muted);font-size:13px;font-weight:800}.required-mark{color:var(--warn)}.form-label-opt{font-weight:600;color:#7fa3b8}.form-input{width:100%;border:1px solid rgba(100,190,220,.25);border-radius:15px;background:#061826;color:var(--text);padding:13px 14px;outline:none;font:inherit}.form-input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(73,196,213,.10)}textarea.form-input{resize:vertical;min-height:88px}.form-select option{background:#061826;color:var(--text)}.ndis-section{display:none;margin-top:16px;padding:16px;border:1px solid rgba(73,196,213,.28);background:rgba(73,196,213,.055);border-radius:18px}.ndis-section.show{display:block}.ndis-divider{display:flex;align-items:center;color:var(--brand);font-weight:900;margin-bottom:14px}.ndis-divider:before,.ndis-divider:after{content:'';height:1px;background:var(--line);flex:1}.ndis-divider span{padding:0 12px}.ndis-toggle-row{margin-top:14px}.ndis-toggle-label{display:inline-flex;align-items:center;gap:10px;color:var(--muted);font-weight:800;cursor:pointer}.ndis-checkbox{display:none}.toggle-track{width:48px;height:27px;background:#061826;border:1px solid var(--line);border-radius:999px;position:relative}.toggle-thumb{position:absolute;width:21px;height:21px;border-radius:99px;background:var(--muted);left:3px;top:2px;transition:.2s}.ndis-checkbox:checked+.toggle-track{background:rgba(73,196,213,.18);border-color:var(--brand)}.ndis-checkbox:checked+.toggle-track .toggle-thumb{transform:translateX(20px);background:var(--brand)}.form-actions,.modal-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}.tabs-wrap{overflow:auto}.tabs{display:flex;gap:8px}.trip-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.trip-card{border:1px solid var(--line);border-radius:18px;background:rgba(255,255,255,.035);padding:15px;display:grid;gap:12px}.trip-top{display:flex;justify-content:space-between;gap:12px}.trip-route{font-size:18px;font-weight:900}.trip-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px}.mini-box{border:1px solid var(--line);border-radius:13px;background:#061826;padding:10px}.mini-label{font-size:11px;color:var(--muted);margin-bottom:2px}.badge{display:inline-flex;align-items:center;border-radius:999px;padding:6px 9px;font-size:11px;font-weight:900}.badge.pending{background:rgba(242,193,78,.13);color:#ffd86c}.badge.assigned{background:rgba(73,196,213,.13);color:#86e7f3}.badge.completed{background:rgba(86,213,139,.13);color:#8bf0b5}.badge.cancelled{background:rgba(255,119,119,.13);color:#ffadad}.pay-line{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;border-top:1px solid var(--line);padding-top:10px}.price{font-size:18px;font-weight:900}.small-btn{padding:9px 11px;border-radius:12px;font-size:12px}.empty{grid-column:1/-1;border:1px dashed var(--line);border-radius:18px;padding:20px;text-align:center;color:var(--muted)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.62);display:grid;place-items:center;padding:18px;z-index:100}.modal-overlay[hidden]{display:none}.modal-card{width:min(720px,100%);max-height:92vh;overflow:auto;border:1px solid var(--line);border-radius:24px;background:#082033;box-shadow:var(--shadow);padding:22px;position:relative}.modal-close{position:absolute;right:16px;top:16px;width:34px;height:34px;border-radius:12px;display:grid;place-items:center}.modal-title{margin:0 38px 6px 0;font-size:22px}.modal-route{color:var(--muted);margin-top:0}.star-picker{display:flex;gap:8px;margin:12px 0}.star{font-size:34px;line-height:1;border:none;background:transparent;color:#496878;padding:0 4px}.star.active{color:#ffd76f}.rating-hint{color:var(--muted);min-height:20px}.reason-section{padding:12px;border:1px solid var(--line);border-radius:16px;background:#061826;margin-bottom:14px}.reason-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.reason-btn.active{border-color:var(--brand);background:rgba(73,196,213,.12)}.other-reason-wrap{margin-top:10px}.detail-modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.detail-driver-val,.payment-detail-block{display:block;border:1px solid var(--line);border-radius:14px;background:#061826;padding:12px;color:var(--text);min-height:45px}
@media(max-width:780px){.page{padding:14px}.top-bar,.section-head,.trip-top{flex-direction:column;align-items:stretch}.form-grid,.trip-grid,.detail-modal-grid,.reason-grid{grid-template-columns:1fr}.type-toggle{grid-template-columns:1fr}.trip-meta{grid-template-columns:1fr}.tabs{min-width:max-content}.card{padding:16px}}

</style>
</head>
<body>

<div class="page">

  <header class="top-bar" role="banner">
    <div class="top-bar-left">
      <div class="avatar" role="img" aria-label="User initials: JD">JD</div>
      <div>
        <div class="top-bar-title">Good morning, Jane</div>
        <div class="top-bar-sub" aria-hidden="true">Ready for your next trip?</div>
      </div>
    </div>
    <div class="status-pill" role="status" aria-label="System status: online">
      <span class="status-dot" aria-hidden="true"></span>
      Online
    </div>
  </header>

  <section class="card" aria-labelledby="bookingTitle">

    <div class="section-head">
      <div>
        <h2 class="section-title" id="bookingTitle">Book a Ride</h2>
        <p class="section-sub" id="bookingDesc">Fill in your trip details below</p>
      </div>
    </div>

    <div class="booking-body">
      <div class="type-toggle" role="group" aria-label="Select booking type">
        <button type="button" class="type-btn active" data-type="normal"
          aria-pressed="true">Normal Booking</button>
        <button type="button" class="type-btn" data-type="ndis"
          aria-pressed="false">NDIS Booking</button>
      </div>

      <form id="bookingForm" novalidate aria-describedby="bookingDesc">

        <div class="form-grid">
          <div class="form-group">
            <label class="form-label" for="pickup">
              Pickup Location <span class="required-mark" aria-hidden="true">*</span>
            </label>
            <input
              type="text"
              id="pickup"
              class="form-input"
              placeholder="e.g. Liverpool Hospital, NSW"
              required
              aria-required="true"
              autocomplete="street-address" />
          </div>

          <div class="form-group">
            <label class="form-label" for="destination">
              Destination <span class="required-mark" aria-hidden="true">*</span>
            </label>
            <input
              type="text"
              id="destination"
              class="form-input"
              placeholder="e.g. Westmead Hospital, NSW"
              required
              aria-required="true" />
          </div>

          <div class="form-group">
            <label class="form-label" for="tripDate">
              Date <span class="required-mark" aria-hidden="true">*</span>
            </label>
            <input
              type="date"
              id="tripDate"
              class="form-input"
              required
              aria-required="true" />
          </div>

          <div class="form-group">
            <label class="form-label" for="tripTime">
              Time <span class="required-mark" aria-hidden="true">*</span>
            </label>
            <input
              type="time"
              id="tripTime"
              class="form-input"
              required
              aria-required="true" />
          </div>

          <div class="form-group">
            <label class="form-label" for="serviceType">Service Type</label>
            <select id="serviceType" class="form-input form-select">
              <option value="">Select service</option>
              <option>Medical</option>
              <option>Therapy</option>
              <option>Community Access</option>
              <option>Education</option>
              <option>Work</option>
              <option>Shopping</option>
              <option>Social</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label" for="vehicleType">Vehicle Type</label>
            <select id="vehicleType" class="form-input form-select">
              <option value="">Select vehicle</option>
              <option>Standard</option>
              <option>XL</option>
              <option>Accessible</option>
              <option>Premium Support</option>
            </select>
          </div>

          <div class="form-group full">
            <label class="form-label" for="notes">Notes <span class="form-label-opt">(optional)</span></label>
            <textarea id="notes" class="form-input" rows="3"
              placeholder="Any pickup instructions or special notes…"></textarea>
          </div>
        </div>

        <div
          id="ndisSection"
          class="ndis-section"
          aria-hidden="true"
          aria-label="NDIS support details">

          <div class="ndis-divider" aria-hidden="true">
            <span>NDIS Support Details</span>
          </div>

          <div class="form-grid">

            <div class="form-group">
              <label class="form-label" for="participantId">Participant ID</label>
              <input type="text" id="participantId" class="form-input" placeholder="Enter participant ID" />
            </div>

            <div class="form-group">
              <label class="form-label" for="supportLevel">Support Level</label>
              <select id="supportLevel" class="form-input form-select">
                <option>Standard</option>
                <option>Assisted</option>
                <option>Wheelchair</option>
                <option>Companion Required</option>
                <option>High Support</option>
              </select>
            </div>

            <div class="form-group">
              <label class="form-label" for="fundingType">Funding Type</label>
              <select id="fundingType" class="form-input form-select">
                <option>Plan Managed</option>
                <option>Self Managed</option>
                <option>Agency Managed</option>
              </select>
            </div>

            <div class="form-group">
              <label class="form-label" for="carerCompanion">Carer / Companion</label>
              <select id="carerCompanion" class="form-input form-select">
                <option>No</option>
                <option>Yes</option>
              </select>
            </div>
            <div class="form-group full">
              <label class="form-label" for="specialReq">
                Special Requirements <span class="form-label-opt">(optional)</span>
              </label>
              <textarea
                id="specialReq"
                class="form-input"
                placeholder="NDIS-specific requirements, support needs, or preferences…"
                rows="3"></textarea>
            </div>
          </div>
        </div>

        <div class="ndis-toggle-row">
          <label class="ndis-toggle-label" for="ndisToggle">
            <input
              type="checkbox"
              id="ndisToggle"
              class="ndis-checkbox"
              aria-controls="ndisSection"
              aria-expanded="false" />
            <span class="toggle-track" aria-hidden="true">
              <span class="toggle-thumb"></span>
            </span>
            I need NDIS support for this trip
          </label>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">
            <svg width="15" height="15" viewBox="0 0 16 16" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round" aria-hidden="true">
              <path d="M2 8h10M8 4l4 4-4 4"/>
            </svg>
            Request Ride
          </button>
          <button type="reset" class="btn btn-ghost">Clear form</button>
        </div>

      </form>
    </div>
  </section>

  <section class="card" aria-labelledby="tripsTitle">

    <div class="section-head trips-section-head">
      <div>
        <h2 class="section-title" id="tripsTitle">My Trips</h2>
        <p class="section-sub">Your upcoming and recent bookings</p>
      </div>

      <nav class="tabs-wrap" aria-label="Trip filter">
        <div class="tabs" role="tablist">
          <button class="tab active" role="tab"
            data-tab="today" aria-selected="true"
            id="tab-today" aria-controls="tripGrid">Today</button>
          <button class="tab" role="tab"
            data-tab="upcoming" aria-selected="false"
            id="tab-upcoming" aria-controls="tripGrid">Upcoming</button>
          <button class="tab" role="tab"
            data-tab="history" aria-selected="false"
            id="tab-history" aria-controls="tripGrid">History</button>
        </div>
      </nav>
    </div>

    <div
      id="tripGrid"
      class="trip-grid"
      role="list"
      aria-live="polite"
      aria-atomic="false"
      aria-label="Trip list"></div>

  </section>
</div>

<div id="ratingModal" class="modal-overlay" role="dialog"
  aria-modal="true" aria-labelledby="ratingModalTitle" hidden>

  <div class="modal-card" role="document">

    <button class="modal-close" id="ratingModalClose" aria-label="Close rating dialog">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"
        stroke="currentColor" stroke-width="2.4" stroke-linecap="round"
        aria-hidden="true">
        <path d="M2 2l12 12M14 2L2 14"/>
      </svg>
    </button>

    <h3 class="modal-title" id="ratingModalTitle">Rate Your Trip</h3>
    <p class="modal-route" id="ratingModalRoute"></p>

    <div class="star-picker" id="starPicker"
      role="radiogroup"
      aria-label="Star rating"
      aria-required="true"></div>

    <p class="rating-hint" id="ratingHint" aria-live="polite" aria-atomic="true">&nbsp;</p>

    <div id="reasonSection" class="reason-section" hidden aria-hidden="true">
      <label class="form-label reason-section-label">What went wrong? <span class="required-mark" aria-hidden="true">*</span></label>
      <div class="reason-grid" id="reasonGrid" role="group" aria-label="Select a reason"></div>
      <div id="otherReasonWrap" class="other-reason-wrap" hidden>
        <input
          type="text"
          id="otherReason"
          class="form-input"
          placeholder="Please describe the issue…"
          aria-label="Describe the issue" />
      </div>
    </div>

    <label class="form-label" for="ratingComment">
      Feedback <span class="form-label-opt" id="commentOptLabel">(optional)</span>
    </label>
    <textarea
      id="ratingComment"
      class="form-input modal-textarea"
      placeholder="Optional — share any feedback about your trip…"
      rows="3"
      aria-label="Trip feedback (optional)"></textarea>

    <div class="modal-actions">
      <button class="btn btn-primary" id="submitRating"
        disabled aria-disabled="true">Submit Rating</button>
      <button class="btn btn-ghost" id="cancelRating">Cancel</button>
    </div>

  </div>
</div>

<div id="detailModal" class="modal-overlay" role="dialog"
  aria-modal="true" aria-labelledby="detailModalTitle" hidden>

  <div class="modal-card detail-modal-card" role="document">

    <button class="modal-close" id="detailModalClose" aria-label="Close trip details">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"
        stroke="currentColor" stroke-width="2.4" stroke-linecap="round" aria-hidden="true">
        <path d="M2 2l12 12M14 2L2 14"/>
      </svg>
    </button>

    <h3 class="modal-title" id="detailModalTitle">Trip Details</h3>

    <div class="detail-modal-grid">

      <div class="form-group">
        <label class="form-label" for="dPickup">Pickup Location</label>
        <input type="text" id="dPickup" class="form-input" />
      </div>

      <div class="form-group">
        <label class="form-label" for="dDropoff">Drop-off Location</label>
        <input type="text" id="dDropoff" class="form-input" />
      </div>

      <div class="form-group">
        <label class="form-label" for="dDate">Date</label>
        <input type="date" id="dDate" class="form-input" />
      </div>

      <div class="form-group">
        <label class="form-label" for="dTime">Time</label>
        <input type="time" id="dTime" class="form-input" />
      </div>

      <div class="form-group">
        <label class="form-label" for="dService">Service Type</label>
        <select id="dService" class="form-input form-select">
          <option>Medical</option>
          <option>Therapy</option>
          <option>Community Access</option>
          <option>Employment</option>
          <option>Social &amp; Recreational</option>
          <option>Standard</option>
        </select>
      </div>

      <div class="form-group" id="dNdisRow">
        <label class="form-label" for="dSupport">Support Level</label>
        <select id="dSupport" class="form-input form-select">
          <option>Standard</option>
          <option>Assisted</option>
          <option>Wheelchair</option>
          <option>Companion Required</option>
          <option>High Support</option>
        </select>
      </div>

      <div class="form-group" id="dFundingRow">
        <label class="form-label" for="dFunding">Funding Type</label>
        <select id="dFunding" class="form-input form-select">
          <option>Plan Managed</option>
          <option>Self Managed</option>
          <option>Agency Managed</option>
        </select>
      </div>

      <div class="form-group" id="dCarerRow">
        <label class="form-label" for="dCarer">Carer / Companion</label>
        <select id="dCarer" class="form-input form-select">
          <option>No</option>
          <option>Yes</option>
        </select>
      </div>

      <div class="form-group" id="dParticipantRow">
        <label class="form-label" for="dParticipant">Participant ID</label>
        <input type="text" id="dParticipant" class="form-input" placeholder="Enter participant ID" />
      </div>

      <div class="form-group" id="dDriverRow">
        <span class="form-label">Assigned Driver</span>
        <span class="detail-driver-val" id="dDriver"></span>
      </div>

      <div class="form-group" id="dPaymentRow">
        <span class="form-label">Payment</span>
        <div class="payment-detail-block" id="dPaymentBlock"></div>
      </div>

      <div class="form-group form-group--full">
        <label class="form-label" for="dNotes">Notes <span class="form-label-opt">(optional)</span></label>
        <textarea id="dNotes" class="form-input" rows="3" placeholder="Any special instructions…"></textarea>
      </div>

    </div>

    <div class="modal-actions">
      <button class="btn btn-primary" id="detailSaveBtn">Save changes</button>
      <button class="btn btn-ghost" id="detailCancelBtn">Cancel</button>
    </div>

  </div>
</div>


<script>

(() => {
  const $ = (id) => document.getElementById(id);
  const todayISO = new Date().toISOString().slice(0,10);
  const tomorrow = new Date(Date.now()+86400000).toISOString().slice(0,10);
  const trips = [
    {id:'UV-1001', type:'normal', pickup:'Liverpool Hospital, NSW', destination:'Westmead Hospital, NSW', date:todayISO, time:'09:30', service:'Medical', vehicle:'Standard', status:'pending', paymentStatus:'unpaid', price:42, driver:'Not assigned', notes:'Main entrance pickup'},
    {id:'UV-1002', type:'ndis', pickup:'Parramatta, NSW', destination:'Blacktown Therapy Centre', date:tomorrow, time:'13:15', service:'Therapy', vehicle:'Accessible', status:'assigned', paymentStatus:'ndis invoice', price:68, driver:'Ahmed Ali', support:'Wheelchair', funding:'Plan Managed', carer:'Yes'},
    {id:'UV-0997', type:'normal', pickup:'Bankstown, NSW', destination:'Sydney CBD', date:'2026-04-20', time:'10:00', service:'Work', vehicle:'XL', status:'completed', paymentStatus:'paid', price:55, driver:'Sarah M.', rating:null},
    {id:'UV-0994', type:'ndis', pickup:'Campbelltown, NSW', destination:'Community Centre', date:'2026-03-22', time:'11:20', service:'Community Access', vehicle:'Premium Support', status:'completed', paymentStatus:'paid', price:74, driver:'John D.', support:'Assisted', funding:'Self Managed', carer:'No'}
  ];
  let activeTab = 'today';
  let ratingTripId = null;
  let selectedRating = 0;
  let selectedReason = '';
  const reasons = ['Driver was late','Driver behaviour issue','Vehicle not clean','Unsafe driving','Wrong pickup/drop-off','Booking issue','Payment issue','Other'];

  function syncNdis(show){
    $('ndisSection').classList.toggle('show', show);
    $('ndisSection').setAttribute('aria-hidden', String(!show));
    $('ndisToggle').checked = show;
    $('ndisToggle').setAttribute('aria-expanded', String(show));
    document.querySelectorAll('.type-btn').forEach(b => {
      const active = b.dataset.type === (show ? 'ndis':'normal');
      b.classList.toggle('active', active); b.setAttribute('aria-pressed', String(active));
    });
  }
  document.querySelectorAll('.type-btn').forEach(btn => btn.addEventListener('click',()=>syncNdis(btn.dataset.type==='ndis')));
  $('ndisToggle').addEventListener('change', e => syncNdis(e.target.checked));
  $('tripDate').min = todayISO;

  function badge(s){return `<span class="badge ${s}">${s}</span>`}
  function filterTrips(){
    if(activeTab==='today') return trips.filter(t=>t.date===todayISO && t.status!=='completed');
    if(activeTab==='upcoming') return trips.filter(t=>t.date>=todayISO && t.status!=='completed');
    return trips.filter(t=>t.status==='completed' || t.date<todayISO);
  }
  function tripCard(t){
    const isCompleted = t.status==='completed';
    const canPay = t.type === 'normal' && t.paymentStatus !== 'paid' && t.status !== 'cancelled';
    return `<article class="trip-card" role="listitem">
      <div class="trip-top"><div><div class="trip-route">${t.pickup} → ${t.destination}</div><div class="section-sub">${t.id} • ${t.type.toUpperCase()} booking</div></div><div>${badge(t.status)}</div></div>
      <div class="trip-meta">
        <div class="mini-box"><div class="mini-label">Date</div><strong>${t.date}</strong></div>
        <div class="mini-box"><div class="mini-label">Time</div><strong>${t.time}</strong></div>
        <div class="mini-box"><div class="mini-label">Service</div><strong>${t.service || '-'}</strong></div>
        <div class="mini-box"><div class="mini-label">Vehicle</div><strong>${t.vehicle || '-'}</strong></div>
      </div>
      <div class="pay-line"><div><div class="mini-label">Payment</div><div class="price">$${Number(t.price||0).toFixed(2)} <span class="section-sub">• ${t.paymentStatus}</span></div></div><div>
        ${canPay ? `<button class="btn btn-primary small-btn" data-action="pay" data-id="${t.id}">Pay Now</button>` : ''}
        <button class="btn btn-ghost small-btn" data-action="details" data-id="${t.id}">View / Edit</button>
        ${isCompleted && !t.rating ? `<button class="btn btn-ghost small-btn" data-action="rate" data-id="${t.id}">Rate</button>` : ''}
      </div></div>
    </article>`;
  }
  function renderTrips(){
    const list = filterTrips();
    $('tripGrid').innerHTML = list.length ? list.map(tripCard).join('') : '<div class="empty">No trips in this section yet.</div>';
  }
  document.querySelectorAll('.tab').forEach(tab => tab.addEventListener('click',()=>{
    activeTab = tab.dataset.tab;
    document.querySelectorAll('.tab').forEach(t=>{t.classList.toggle('active',t===tab);t.setAttribute('aria-selected',String(t===tab));});
    renderTrips();
  }));
  $('tripGrid').addEventListener('click', e=>{
    const btn = e.target.closest('button[data-action]'); if(!btn) return;
    const trip = trips.find(t=>t.id===btn.dataset.id); if(!trip) return;
    if(btn.dataset.action==='pay'){ trip.paymentStatus='paid'; alert('Payment marked as paid for MVP demo. Stripe can be connected later.'); renderTrips(); }
    if(btn.dataset.action==='details') openDetails(trip);
    if(btn.dataset.action==='rate') openRating(trip);
  });
  $('bookingForm').addEventListener('submit', e=>{
    e.preventDefault();
    if(!$('pickup').value || !$('destination').value || !$('tripDate').value || !$('tripTime').value){ alert('Please complete required fields.'); return; }
    const isNdis = $('ndisToggle').checked;
    trips.unshift({id:'UV-'+Math.floor(1000+Math.random()*9000),type:isNdis?'ndis':'normal',pickup:$('pickup').value,destination:$('destination').value,date:$('tripDate').value,time:$('tripTime').value,service:$('serviceType').value||'Standard',vehicle:$('vehicleType').value||'Standard',status:'pending',paymentStatus:isNdis?'ndis invoice':'unpaid',price:isNdis?65:38,driver:'Not assigned',notes:$('notes').value,support:$('supportLevel').value,funding:$('fundingType').value,carer:$('carerCompanion').value});
    activeTab = 'upcoming'; document.querySelector('[data-tab="upcoming"]').click(); e.target.reset(); syncNdis(false); alert('Ride request added to passenger trips.');
  });
  $('bookingForm').addEventListener('reset',()=>setTimeout(()=>syncNdis(false),0));

  function openDetails(t){
    $('dPickup').value=t.pickup||'';$('dDropoff').value=t.destination||'';$('dDate').value=t.date||'';$('dTime').value=t.time||'';$('dService').value=t.service||'Standard';$('dSupport').value=t.support||'Standard';$('dFunding').value=t.funding||'Plan Managed';$('dCarer').value=t.carer||'No';$('dParticipant').value=t.participantId||'';$('dDriver').textContent=t.driver||'Not assigned';$('dPaymentBlock').innerHTML=`$${Number(t.price||0).toFixed(2)} • ${t.paymentStatus}`;$('dNotes').value=t.notes||'';
    $('detailModal').hidden=false; $('detailSaveBtn').onclick=()=>{t.pickup=$('dPickup').value;t.destination=$('dDropoff').value;t.date=$('dDate').value;t.time=$('dTime').value;t.service=$('dService').value;t.support=$('dSupport').value;t.funding=$('dFunding').value;t.carer=$('dCarer').value;t.participantId=$('dParticipant').value;t.notes=$('dNotes').value;$('detailModal').hidden=true;renderTrips();};
  }
  ['detailModalClose','detailCancelBtn'].forEach(id=>$(id).addEventListener('click',()=>$('detailModal').hidden=true));

  function buildStars(){ $('starPicker').innerHTML = [1,2,3,4,5].map(n=>`<button class="star ${n<=selectedRating?'active':''}" data-star="${n}" aria-label="${n} star">★</button>`).join(''); }
  function updateRatingUI(){
    buildStars(); const low = selectedRating>0 && selectedRating<=3;
    $('reasonSection').hidden = !low; $('reasonSection').setAttribute('aria-hidden',String(!low));
    $('submitRating').disabled = !selectedRating || (low && !selectedReason); $('submitRating').setAttribute('aria-disabled',String($('submitRating').disabled));
    $('ratingHint').textContent = selectedRating ? (low ? 'Low ratings require a reason.' : 'Thank you — comment is optional.') : 'Select a star rating.';
  }
  $('reasonGrid').innerHTML = reasons.map(r=>`<button class="reason-btn" data-reason="${r}">${r}</button>`).join('');
  $('starPicker').addEventListener('click',e=>{const b=e.target.closest('[data-star]'); if(!b)return; selectedRating=Number(b.dataset.star); selectedReason=''; document.querySelectorAll('.reason-btn').forEach(x=>x.classList.remove('active')); $('otherReasonWrap').hidden=true; updateRatingUI();});
  $('reasonGrid').addEventListener('click',e=>{const b=e.target.closest('[data-reason]'); if(!b)return; selectedReason=b.dataset.reason; document.querySelectorAll('.reason-btn').forEach(x=>x.classList.toggle('active',x===b)); $('otherReasonWrap').hidden=selectedReason!=='Other'; updateRatingUI();});
  function openRating(t){ratingTripId=t.id; selectedRating=0; selectedReason=''; $('ratingModalRoute').textContent=`${t.pickup} → ${t.destination}`;$('ratingComment').value='';$('otherReason').value='';$('ratingModal').hidden=false;updateRatingUI();}
  ['ratingModalClose','cancelRating'].forEach(id=>$(id).addEventListener('click',()=>$('ratingModal').hidden=true));
  $('submitRating').addEventListener('click',()=>{const t=trips.find(x=>x.id===ratingTripId); if(t){t.rating={stars:selectedRating,reason:selectedReason==='Other'?$('otherReason').value||'Other':selectedReason,comment:$('ratingComment').value};} $('ratingModal').hidden=true; renderTrips(); alert('Rating saved. Admin dashboard can read this later.');});
  renderTrips(); syncNdis(false);
})();

</script>
</body>
</html>
