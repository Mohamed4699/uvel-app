<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UVEL Full Working Version</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:Arial;background:#061623;color:#fff;margin:0;padding:20px}
.container{max-width:900px;margin:auto}
.card{background:#0a2337;padding:20px;border-radius:16px;margin-bottom:20px}
input,select,button{width:100%;padding:12px;margin-top:10px;border-radius:10px;border:none}
button{background:#49c4d5;color:#000;font-weight:bold;cursor:pointer}
.hidden{display:none}
</style>
</head>

<body>
<div class="container">

<div id="auth">
<div class="card">
<h2>Sign Up</h2>
<input id="suName" placeholder="Name">
<input id="suEmail" placeholder="Email">
<input id="suPass" placeholder="Password">
<select id="suRole">
<option value="admin">Admin</option>
<option value="driver">Driver</option>
<option value="passenger">Passenger</option>
</select>
<button onclick="signup()">Create Account</button>
</div>

<div class="card">
<h2>Sign In</h2>
<input id="siEmail" placeholder="Email">
<input id="siPass" placeholder="Password">
<button onclick="signin()">Login</button>
<button onclick="reset()">Reset Password</button>
</div>
</div>

<div id="app" class="hidden">
<div class="card">
<h2>Dashboard</h2>
<p id="userInfo"></p>
<button onclick="logout()">Logout</button>
</div>
</div>

<div class="card">
<pre id="log">Waiting...</pre>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA1vVdTnIew6pZQU3CrqGJkbhd9m79Md_Q",
  authDomain: "uvel-platform.firebaseapp.com",
  projectId: "uvel-platform"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

const log = msg => document.getElementById("log").textContent = msg;

window.signup = async () => {
  try{
    const name = suName.value;
    const email = suEmail.value;
    const pass = suPass.value;
    const role = suRole.value;

    const cred = await createUserWithEmailAndPassword(auth,email,pass);

    await setDoc(doc(db,"users",cred.user.uid),{
      name,email,role
    });

    log("Signup success");
  }catch(e){
    log(e.message);
  }
}

window.signin = async () => {
  try{
    const email = siEmail.value;
    const pass = siPass.value;
    await signInWithEmailAndPassword(auth,email,pass);
    log("Login success");
  }catch(e){
    log(e.message);
  }
}

window.reset = async () => {
  try{
    await sendPasswordResetEmail(auth, siEmail.value);
    log("Reset email sent");
  }catch(e){
    log(e.message);
  }
}

window.logout = async () => {
  await signOut(auth);
}

onAuthStateChanged(auth, async user => {
  if(!user){
    authDiv(true);
    return;
  }

  const snap = await getDoc(doc(db,"users",user.uid));
  const data = snap.data();

  document.getElementById("userInfo").innerText =
    data.name + " (" + data.role + ")";

  authDiv(false);
});

function authDiv(show){
  document.getElementById("auth").classList.toggle("hidden",!show);
  document.getElementById("app").classList.toggle("hidden",show);
}
</script>

</body>
</html>
