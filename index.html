<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
  import {
    getFirestore,
    collection,
    addDoc,
    getDocs,
    doc,
    updateDoc,
    deleteDoc
  } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA1vVdTnIew6pZQU3CrqGJkbhd9m79Md_Q",
    authDomain: "uvel-platform.firebaseapp.com",
    projectId: "uvel-platform",
    storageBucket: "uvel-platform.firebasestorage.app",
    messagingSenderId: "95958245890",
    appId: "1:95958245890:web:2afc9544e7ea16b395bd1b"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const drivers = ["Michael", "Olivia", "Daniel", "Nadia"];

  window.show = function(section) {
    document.getElementById("ride").classList.remove("active");
    document.getElementById("driver").classList.remove("active");
    document.getElementById("admin").classList.remove("active");

    document.getElementById(section).classList.add("active");

    if (section === "admin") showBookings();
    if (section === "driver") showDriverTrips();
  };

  window.requestRide = async function() {
    const pickup = document.getElementById("pickup").value.trim();
    const destination = document.getElementById("destination").value.trim();

    if (!pickup || !destination) {
      alert("Please fill in pickup and destination.");
      return;
    }

    await addDoc(collection(db, "bookings"), {
      pickup: pickup,
      destination: destination,
      status: "Pending",
      driver: "Unassigned",
      createdAt: Date.now()
    });

    document.getElementById("pickup").value = "";
    document.getElementById("destination").value = "";

    alert("Ride Requested Successfully ✅");
    await showBookings();
  };

  function getStatusClass(status) {
    if (status === "Assigned") return "assigned";
    if (status === "Completed") return "completed";
    return "pending";
  }

  window.showBookings = async function() {
    const bookingList = document.getElementById("bookingList");
    const querySnapshot = await getDocs(collection(db, "bookings"));

    if (querySnapshot.empty) {
      bookingList.innerHTML = '<p class="empty-text">No bookings yet.</p>';
      return;
    }

    let html = "";

    querySnapshot.forEach((docSnap) => {
      const b = docSnap.data();
      const bookingId = docSnap.id;

      let driverOptions = '<option value="">Assign driver</option>';
      drivers.forEach((driver) => {
        driverOptions += `<option value="${driver}">${driver}</option>`;
      });

      let assignControl = "";
      let completeControl = "";

      if (b.status === "Pending") {
        assignControl = `
          <br>
          <select onchange="assignDriver('${bookingId}', this.value)">
            ${driverOptions}
          </select>
        `;
      }

      if (b.status === "Assigned") {
        completeControl = `
          <br>
          <button class="complete-btn" onclick="completeTrip('${bookingId}')">Mark Completed</button>
        `;
      }

      html += `
        <div class="booking-card">
          <p><strong>Booking ID:</strong> ${bookingId}</p>
          <p><strong>Pickup:</strong> ${b.pickup}</p>
          <p><strong>Destination:</strong> ${b.destination}</p>
          <p><strong>Driver:</strong> ${b.driver}</p>
          <span class="status ${getStatusClass(b.status)}">${b.status}</span>
          ${assignControl}
          ${completeControl}
          <br>
          <button class="delete-btn" onclick="deleteBooking('${bookingId}')">Delete</button>
        </div>
      `;
    });

    bookingList.innerHTML = html;
  };

  window.assignDriver = async function(bookingId, driverName) {
    if (!driverName) return;

    await updateDoc(doc(db, "bookings", bookingId), {
      driver: driverName,
      status: "Assigned"
    });

    await showBookings();
    await showDriverTrips();
  };

  window.completeTrip = async function(bookingId) {
    await updateDoc(doc(db, "bookings", bookingId), {
      status: "Completed"
    });

    await showBookings();
    await showDriverTrips();
  };

  window.deleteBooking = async function(bookingId) {
    const confirmDelete = confirm("Are you sure you want to delete this booking?");
    if (!confirmDelete) return;

    await deleteDoc(doc(db, "bookings", bookingId));
    await showBookings();
    await showDriverTrips();
  };

  window.goOnline = function() {
    alert("Driver is now Online ✅");
  };

  window.goOffline = function() {
    alert("Driver is now Offline ✅");
  };

  window.showDriverTrips = async function() {
    const driverTrips = document.getElementById("driverTrips");
    const querySnapshot = await getDocs(collection(db, "bookings"));

    let html = "";
    let hasAssignedTrips = false;

    querySnapshot.forEach((docSnap) => {
      const trip = docSnap.data();

      if (trip.status === "Assigned") {
        hasAssignedTrips = true;
        html += `
          <div class="driver-card">
            <p><strong>Booking ID:</strong> ${docSnap.id}</p>
            <p><strong>Pickup:</strong> ${trip.pickup}</p>
            <p><strong>Destination:</strong> ${trip.destination}</p>
            <p><strong>Assigned Driver:</strong> ${trip.driver}</p>
            <span class="status assigned">${trip.status}</span>
          </div>
        `;
      }
    });

    if (!hasAssignedTrips) {
      driverTrips.innerHTML = '<p class="empty-text">No assigned trips yet.</p>';
      return;
    }

    driverTrips.innerHTML = html;
  };

  window.onload = async function() {
    await showBookings();
    await showDriverTrips();
  };
</script>
